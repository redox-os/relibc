# POSIX header spec: https://pubs.opengroup.org/onlinepubs/9799919799/basedefs/sys_types.h.html
#
# This types is split out to prevent importing all of sys/types.h into other headers.
#
# POSIX headers that require pthread_t:
# - pthread.h
# - signal.h
# - sys/types.h (where it should be defined)
# - threads.h (not in spec but POSIX admits most implementations share definitions with pthread.h)
include_guard = "_RELIBC_BITS_PTHREAD_T_H"
language = "C"
no_includes = true
cpp_compat = true
[export]
include = ["pthread_t"]
[enum]
prefix_with_name = true
