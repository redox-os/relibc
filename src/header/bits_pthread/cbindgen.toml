# POSIX header spec: https://pubs.opengroup.org/onlinepubs/9799919799/basedefs/sys_types.h.html
#
# These types are split out to prevent importing all of sys/types.h into other headers.
#
# POSIX headers that require them:
# - aio.h (pthread_attr_t only)
# - pthread.h (all of them)
# - signal (pthread_t and pthread_attr_t only)
# - sys/types.h (where they should be defined)
#
# TODO split out pthread_t and pthread_attr_t
include_guard = "_RELIBC_BITS_PTHREAD_H"
language = "C"
style = "type"
no_includes = true
cpp_compat = true
# TODO: Any better way to implement pthread_cleanup_push/pthread_cleanup_pop?
after_includes = """
#define PTHREAD_COND_INITIALIZER {0}
#define PTHREAD_MUTEX_INITIALIZER {0}
#define PTHREAD_RWLOCK_INITIALIZER {0}
#define PTHREAD_ONCE_INIT ((pthread_once_t){0})

#define pthread_cleanup_push(ROUTINE, ARG) do { \\
  struct { \\
    void (*routine)(void *); \\
    void *arg; \\
    void *prev; \\
  } __relibc_internal_pthread_ll_entry = { \\
    .routine = (void (*)(void *))(ROUTINE), \\
    .arg = (void *)(ARG), \\
  }; \\
  __relibc_internal_pthread_cleanup_push(&__relibc_internal_pthread_ll_entry);

#define pthread_cleanup_pop(EXECUTE) \\
  __relibc_internal_pthread_cleanup_pop((EXECUTE)); \\
} while(0)

"""

[export.rename]
"AtomicInt" = "int"
"AtomicUint" = "unsigned"

[export]
include = [
  "pthread_attr_t",
  "pthread_rwlockattr_t",
  "pthread_rwlock_t",
  "pthread_barrier_t",
  "pthread_barrierattr_t",
  "pthread_mutex_t",
  "pthread_mutexattr_t",
  "pthread_condattr_t",
  "pthread_cond_t",
  "pthread_spinlock_t",
  "pthread_once_t",
  "pthread_t",
  "pthread_key_t",
]

[enum]
prefix_with_name = true
