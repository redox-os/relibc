# stddef.h brings in size_t
sys_includes = ["stddef.h"]
# TODO: figure out how to export void* type
after_includes = """
#include <bits/clock-t.h>
#include <bits/clockid-t.h>
#include <bits/gid-t.h>
#include <bits/id-t.h>
#include <bits/mode-t.h>
#include <bits/off-t.h>
#include <bits/pid-t.h>
#include <bits/ssize-t.h>
#include <bits/suseconds-t.h>
#include <bits/time-t.h>
#include <bits/uid-t.h>

typedef void* timer_t;
"""
include_guard = "_RELIBC_SYS_TYPES_INTERNAL_H"
language = "C"
style = "Type"
no_includes = true

[export]
include = [
  "blksize_t",
  "dev_t",
  "ino_t",
  "reclen_t",
  "nlink_t",
  "useconds_t",
  "blkcnt_t",
  "fsblkcnt_t",
  "fsfilcnt_t",
  "u_char",
  "uchar",
  "u_short",
  "ushort",
  "u_int",
  "uint",
  "u_long",
  "ulong",
  "quad_t",
  "u_quad_t",
  "caddr_t"
]
