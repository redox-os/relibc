# POSIX header spec: https://pubs.opengroup.org/onlinepubs/9799919799/basedefs/pwd.h.html
#
# Spec quotations relating to includes:
# - "The <pwd.h> header shall define the gid_t, uid_t, and size_t types as described in <sys/types.h>."
sys_includes = []
after_includes = """
#include <bits/gid-t.h>  // for gid_t from sys/types.h
#include <bits/size-t.h> // for size_t from sys/types.h
#include <bits/uid-t.h>  // for uid_t from sys/types.h
"""
include_guard = "_RELIBC_PWD_H"
language = "C"
style = "Tag"
no_includes = true
cpp_compat = true

[enum]
prefix_with_name = true
